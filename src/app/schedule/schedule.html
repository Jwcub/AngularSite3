@if(error()) {
    <p>{{ error() }}</p>
}

<div class="search-area">
    <label for="#searchQuery">Sök:</label>
    <input #searchQuery type="text" (input)="onSearchUpdated(searchQuery.value)">
</div>

<table>
    <thead>
        <tr>
            <th class="course-code" (click)="sortCourseCode()">Kurskod</th>
            <th (click)="sortCourseName()">Kursnamn</th>
            <th (click)="sortCourseProgression()">Progression</th>
        </tr>
    </thead>
    <tbody>
    @for(course of filteredCourses(); track course.code) {
        <tr>
            <td><a href="{{ course.syllabus }}">{{ course.code }}</a></td>
            <td>{{ course.coursename }}</td>
            <td>{{ course.progression }}</td>
        </tr>    
    }
    </tbody>
</table>
