@if(error()) {
    <p>{{ error() }}</p>
}

<div class="search-area">
    <label for="#searchQuery">Sök:</label>
    <input #searchQuery type="text" (input)="onSearchUpdated(searchQuery.value)">
</div>

<table>
    <thead>
        <tr>
            <th style="width:20%" class="course-code" (click)="sortCourseCode()">Kurskod @if(arrow() === "code") { <span>↓</span>}</th>
            <th style="width:60%" (click)="sortCourseName()">Kursnamn @if(arrow() === "name") { <span>↓</span>}</th>
            <th style="width:20%" (click)="sortCourseProgression()">Progression @if(arrow() === "progression") { <span>↓</span>}</th>
        </tr>
    </thead>
    <tbody>
    @for(course of filteredCourses(); track course.code) {
        <tr>
            <td><a href="{{ course.syllabus }}">{{ course.code }}</a></td>
            <td>{{ course.coursename }}</td>
            <td>{{ course.progression }}</td>
        </tr>    
    }
    </tbody>
</table>
